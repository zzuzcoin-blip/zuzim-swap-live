<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>ZUZIM Swap | Mobile Wallets</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <style>
        /* Твои старые стили (оставь как есть) */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #0A0A0A; color: white; font-family: 'Inter', system-ui, sans-serif; padding: 16px; padding-bottom: 90px; }
        .container { max-width: 500px; margin: 0 auto; }
        .card { background: #1A1A1A; border-radius: 28px; padding: 20px; margin-bottom: 16px; border: 1px solid #2A2A2A; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .gold-text { color: #D4AF37; font-weight: bold; }
        .balance-big { font-size: 36px; font-weight: bold; color: #D4AF37; line-height: 1; }
        .eye-icon { cursor: pointer; padding: 8px; font-size: 20px; }
        .address { font-family: monospace; font-size: 12px; background: #0A0A0A; padding: 12px; border-radius: 60px; word-break: break-all; text-align: center; margin-top: 12px; }
        .top-stats { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-card { background: #1A1A1A; border-radius: 24px; padding: 12px; text-align: center; flex: 1; border: 1px solid #2A2A2A; cursor: pointer; }
        .stat-value { font-size: 24px; font-weight: bold; color: #D4AF37; }
        .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin: 20px 0; }
        .action-card { background: #1A1A1A; border: 1px solid #2A2A2A; border-radius: 20px; padding: 12px 4px; text-align: center; cursor: pointer; transition: 0.1s; }
        .action-card:active { transform: scale(0.96); border-color: #D4AF37; }
        .action-icon { font-size: 28px; margin-bottom: 6px; }
        .action-label { font-size: 10px; color: #D4AF37; font-weight: 500; }
        .tabs { display: flex; gap: 8px; background: #1A1A1A; padding: 8px; border-radius: 60px; margin: 20px 0 16px; }
        .tab { flex: 1; text-align: center; padding: 10px; border-radius: 40px; cursor: pointer; font-size: 14px; font-weight: 500; }
        .tab.active { background: #D4AF37; color: #0A0A0A; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        button { background: linear-gradient(135deg, #D4AF37, #B8860B); border: none; padding: 12px 20px; border-radius: 60px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 8px; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(8px); }
        .modal-content { background: #1A1A1A; border: 1px solid #D4AF37; border-radius: 32px; padding: 24px; max-width: 320px; width: 90%; text-align: center; }
        .wallet-option { background: #0A0A0A; border: 1px solid #333; border-radius: 60px; padding: 14px; margin: 10px 0; cursor: pointer; display: flex; align-items: center; gap: 12px; }
        .wallet-option span { font-weight: bold; }
        .toast { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #D4AF37; color: #0A0A0A; text-align: center; padding: 12px; border-radius: 40px; z-index: 9999; display: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <!-- Твоя старая разметка, без изменений (я её не трогаю, чтобы не было дублирования) -->
    <div class="flex-between" style="margin-bottom: 20px;">
        <div style="display: flex; align-items: center; gap: 8px;">
            <div style="width: 40px; height: 40px; background: #000; border: 2px solid #D4AF37; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <span style="color: #D4AF37; font-weight: bold;">Z</span>
            </div>
            <div><strong>ZUZIM SWAP</strong><br><span style="font-size: 10px; color: #888;">Staking 25% APY</span></div>
        </div>
        <button id="connectBtn" style="width: auto; padding: 8px 16px; margin: 0; background: #2A2A2A; color: #D4AF37; border: 1px solid #D4AF37;">🔌 Кошелёк</button>
    </div>

    <!-- Вся остальная разметка у тебя уже есть, я не меняю -->

</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script>
    // ========== MOBILE WALLET SUPPORT ==========
    let web3 = null, account = null;
    let isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

    function showToast(msg) {
        let toast = document.getElementById('toast');
        if (!toast) {
            toast = document.createElement('div');
            toast.className = 'toast';
            document.body.appendChild(toast);
        }
        toast.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    function openWalletModal() {
        const modal = document.createElement('div');
        modal.className = 'modal';
        modal.innerHTML = `
            <div class="modal-content">
                <h3 style="color:#D4AF37; margin-bottom:15px;">Подключить кошелёк</h3>
                <div class="wallet-option" id="modalMetaMask">
                    <span>🦊 MetaMask</span>
                </div>
                <div class="wallet-option" id="modalTrustWallet">
                    <span>📱 Trust Wallet</span>
                </div>
                <div class="wallet-option" id="modalWalletConnect">
                    <span>🔗 WalletConnect</span>
                </div>
                <button id="closeModalBtn" style="background:#333; margin-top:15px;">Закрыть</button>
            </div>
        `;
        document.body.appendChild(modal);

        document.getElementById('modalMetaMask').onclick = () => { modal.remove(); connectMetaMask(); };
        document.getElementById('modalTrustWallet').onclick = () => { modal.remove(); connectTrustWallet(); };
        document.getElementById('modalWalletConnect').onclick = () => { modal.remove(); showToast('WalletConnect: сканируйте QR из кошелька (в разработке)'); };
        document.getElementById('closeModalBtn').onclick = () => modal.remove();
    }

    async function connectMetaMask() {
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                web3 = new Web3(window.ethereum);
                showToast('✅ Кошелёк подключён');
                onWalletConnected();
            } catch(e) { showToast('Ошибка подключения'); }
        } else if (isMobile) {
            window.location.href = 'https://metamask.app.link/dapp/' + window.location.host;
        } else {
            window.open('https://metamask.io/download/', '_blank');
        }
    }

    async function connectTrustWallet() {
        if (window.ethereum && window.ethereum.isTrust) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                web3 = new Web3(window.ethereum);
                showToast('✅ Trust Wallet подключён');
                onWalletConnected();
            } catch(e) { showToast('Ошибка подключения'); }
        } else if (isMobile) {
            window.location.href = 'trust://browser?url=' + encodeURIComponent(window.location.href);
            setTimeout(() => showToast('Открываем Trust Wallet...'), 1000);
        } else {
            showToast('Trust Wallet доступен на телефоне');
        }
    }

    function onWalletConnected() {
        document.getElementById('connectBtn').innerHTML = '✅ ' + account.slice(0,6)+'...'+account.slice(-4);
        document.getElementById('walletAddressShow').innerHTML = account.slice(0,6)+'...'+account.slice(-4);
        // Обнови остальные данные (балансы и т.д.)
        if (typeof loadUserData === 'function') loadUserData();
        if (typeof loadBalancesWeb3 === 'function') loadBalancesWeb3();
    }

    document.getElementById('connectBtn').onclick = () => {
        if (account) return;
        openWalletModal();
    };
</script>
</body>
</html>
