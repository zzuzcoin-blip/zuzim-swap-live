<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ZUZIM Swap | Обменник ETH/USDT → ZUZ</title>
    <script src="https://cdn.jsdelivr.net/npm/web3@1.10.0/dist/web3.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0A0A0A;
            color: white;
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        .container { max-width: 550px; margin: 0 auto; }
        .card {
            background: #1A1A1A;
            border-radius: 32px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid #D4AF37;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .btn {
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 60px;
            font-weight: bold;
            width: 100%;
            margin-top: 16px;
            cursor: pointer;
            font-size: 16px;
            transition: 0.1s linear;
        }
        .btn:active { transform: scale(0.97); }
        .btn-secondary {
            background: #2A2A2A;
            color: #D4AF37;
            border: 1px solid #D4AF37;
        }
        .balance { font-size: 36px; font-weight: bold; color: #D4AF37; }
        .address {
            font-family: monospace;
            font-size: 12px;
            background: #0A0A0A;
            padding: 12px;
            border-radius: 60px;
            word-break: break-all;
            margin-top: 12px;
            text-align: center;
        }
        .input-group { display: flex; gap: 12px; margin: 16px 0; }
        input {
            flex: 1;
            background: #0A0A0A;
            border: 1px solid #333;
            padding: 14px;
            border-radius: 60px;
            color: white;
            font-size: 16px;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .gold-text { color: #D4AF37; font-weight: bold; }
        hr { border-color: #333; margin: 16px 0; }
        .tabs {
            display: flex;
            gap: 8px;
            background: #1A1A1A;
            padding: 8px;
            border-radius: 60px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            border-radius: 60px;
            transition: 0.1s;
        }
        .tab.active {
            background: #D4AF37;
            color: #0A0A0A;
            font-weight: bold;
        }
        .price-row { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card" style="text-align: center;">
        <div style="font-size: 28px; font-weight: bold;">ZUZIM SWAP</div>
        <div style="color: #888;">Обмен ETH / USDT → ZUZ</div>
        <div class="price-row" id="priceInfo">Загрузка курсов...</div>
    </div>

    <div class="card">
        <div class="flex-between">
            <span>💰 Ваш баланс ZUZ</span>
            <span class="balance" id="zuzBalance">0</span>
        </div>
        <div class="address" id="walletAddress">Кошелёк не подключён</div>
        <button class="btn" id="connectBtn">🔌 ПОДКЛЮЧИТЬ КОШЕЛЁК</button>
    </div>

    <div class="tabs" id="tabs">
        <div class="tab active" data-tab="eth">ETH → ZUZ</div>
        <div class="tab" data-tab="usdt">USDT → ZUZ</div>
        <div class="tab" data-tab="referral">🤝 Партнёры</div>
    </div>

    <!-- Вкладка ETH -->
    <div id="ethTab" class="card">
        <div class="flex-between">
            <span>🪙 Покупка за ETH</span>
            <span class="gold-text">1 ZUZ = 0.0001 ETH</span>
        </div>
        <div class="input-group">
            <input type="number" id="ethAmount" placeholder="Сумма в ETH (мин 0.01)" step="0.01">
            <button class="btn-secondary" id="buyEthBtn" style="width: auto; padding: 14px 24px;">Купить</button>
        </div>
        <div class="flex-between">
            <span>Вы получите:</span>
            <strong class="gold-text" id="receiveZuzEth">0 ZUZ</strong>
        </div>
    </div>

    <!-- Вкладка USDT -->
    <div id="usdtTab" class="card" style="display: none;">
        <div class="flex-between">
            <span>💵 Покупка за USDT</span>
            <span class="gold-text" id="usdtRate">1 ZUZ ≈ ? USDT</span>
        </div>
        <div class="input-group">
            <input type="number" id="usdtAmount" placeholder="Сумма в USDT (мин 10)" step="10">
            <button class="btn-secondary" id="buyUsdtBtn" style="width: auto; padding: 14px 24px;">Купить</button>
        </div>
        <div class="flex-between">
            <span>Вы получите:</span>
            <strong class="gold-text" id="receiveZuzUsdt">0 ZUZ</strong>
        </div>
    </div>

    <!-- Вкладка Партнёры -->
    <div id="referralTab" class="card" style="display: none;">
        <div class="flex-between"><span>👥 Ваши партнёры</span><span id="refCount">0</span></div>
        <div class="flex-between"><span>💰 Заработано</span><span id="refEarned">0 ZUZ</span></div>
        <div class="address" id="refLinkDisplay">Загрузка...</div>
        <button class="btn-secondary" id="copyRefBtn">📋 КОПИРОВАТЬ ССЫЛКУ</button>
    </div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    let telegramId = null;
    if (tg) { tg.ready(); tg.expand(); telegramId = tg.initDataUnsafe?.user?.id; }
    
    let web3 = null, account = null;
    const API_URL = window.location.origin;
    const TOKEN_PRICE_ETH = 0.0001;
    const PRESALE_ADDRESS = '0x8CdeBa5Db0a4046D8BBC655244173750c7DFd553';
    let ethPriceUSD = 3500;
    
    // Переключение вкладок
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById('ethTab').style.display = tab.dataset.tab === 'eth' ? 'block' : 'none';
            document.getElementById('usdtTab').style.display = tab.dataset.tab === 'usdt' ? 'block' : 'none';
            document.getElementById('referralTab').style.display = tab.dataset.tab === 'referral' ? 'block' : 'none';
            if (tab.dataset.tab === 'referral') loadReferrals();
        };
    });
    
    async function loadPrices() {
        try {
            const res = await fetch(`${API_URL}/api/price`);
            const data = await res.json();
            ethPriceUSD = data.eth_usd;
            document.getElementById('priceInfo').innerHTML = `1 ETH ≈ $${ethPriceUSD} | 1 ZUZ ≈ $${data.zuz_usd.toFixed(2)}`;
            document.getElementById('usdtRate').innerHTML = `1 ZUZ ≈ ${(data.zuz_usd).toFixed(2)} USDT`;
        } catch(e) { console.log(e); }
    }
    
    async function loadBalance() {
        if (!telegramId) return;
        const res = await fetch(`${API_URL}/api/balance/${telegramId}`);
        const data = await res.json();
        document.getElementById('zuzBalance').innerText = data.balance.toFixed(0);
    }
    
    async function loadReferrals() {
        if (!telegramId) return;
        const res = await fetch(`${API_URL}/api/referrals/${telegramId}`);
        const data = await res.json();
        document.getElementById('refCount').innerText = data.count;
        document.getElementById('refEarned').innerHTML = data.total.toFixed(0) + ' ZUZ';
        document.getElementById('refLinkDisplay').innerHTML = `t.me/ВАШ_БОТ?start=ref_${telegramId}`;
    }
    
    document.getElementById('connectBtn').onclick = async () => {
        if (window.ethereum) {
            try {
                const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                account = accounts[0];
                web3 = new Web3(window.ethereum);
                document.getElementById('walletAddress').innerHTML = account.slice(0,6)+'...'+account.slice(-4);
                document.getElementById('connectBtn').innerHTML = '✅ КОШЕЛЁК ПОДКЛЮЧЁН';
                await fetch(`${API_URL}/api/register`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ telegram_id: telegramId, wallet_address: account })
                });
                loadBalance();
            } catch(e) { alert('Ошибка подключения'); }
        } else { alert('Установите MetaMask или Trust Wallet'); }
    };
    
    document.getElementById('buyEthBtn').onclick = async () => {
        if (!account) { alert('Подключите кошелёк'); return; }
        const eth = parseFloat(document.getElementById('ethAmount').value);
        if (isNaN(eth) || eth < 0.01) { alert('Минимум 0.01 ETH'); return; }
        
        try {
            const tx = await window.ethereum.request({
                method: 'eth_sendTransaction',
                params: [{ from: account, to: PRESALE_ADDRESS, value: web3.utils.toWei(eth.toString(), 'ether') }]
            });
            await fetch(`${API_URL}/api/buy-eth`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ telegram_id: telegramId, eth_amount: eth, tx_hash: tx })
            });
            alert(`✅ Куплено ${(eth / TOKEN_PRICE_ETH).toFixed(0)} ZUZ!`);
            document.getElementById('ethAmount').value = '';
            document.getElementById('receiveZuzEth').innerText = '0 ZUZ';
            loadBalance();
        } catch(e) { alert('Ошибка транзакции'); }
    };
    
    document.getElementById('buyUsdtBtn').onclick = async () => {
        if (!account) { alert('Подключите кошелёк'); return; }
        const usdt = parseFloat(document.getElementById('usdtAmount').value);
        if (isNaN(usdt) || usdt < 10) { alert('Минимум 10 USDT'); return; }
        alert(`Покупка за USDT: ${usdt} USDT → ${(usdt / ethPriceUSD / TOKEN_PRICE_ETH).toFixed(0)} ZUZ\nТранзакция через Uniswap (в разработке)`);
    };
    
    document.getElementById('copyRefBtn').onclick = () => {
        const link = document.getElementById('refLinkDisplay').innerText;
        navigator.clipboard.writeText('https://t.me/' + link);
        alert('Ссылка скопирована!');
    };
    
    document.getElementById('ethAmount').oninput = () => {
        const eth = parseFloat(document.getElementById('ethAmount').value) || 0;
        document.getElementById('receiveZuzEth').innerText = (eth / TOKEN_PRICE_ETH).toFixed(0) + ' ZUZ';
    };
    
    document.getElementById('usdtAmount').oninput = async () => {
        const usdt = parseFloat(document.getElementById('usdtAmount').value) || 0;
        const zuz = usdt / ethPriceUSD / TOKEN_PRICE_ETH;
        document.getElementById('receiveZuzUsdt').innerText = zuz.toFixed(0) + ' ZUZ';
    };
    
    loadPrices();
    loadBalance();
    setInterval(loadPrices, 60000);
</script>
</body>
</html>
